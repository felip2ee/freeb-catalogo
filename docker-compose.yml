# Stack do Portainer — FreeB (Néctar Pura)
# Deploy: Portainer → Stacks → Add stack → Repository (aponta p/ este repo no GitHub)
#   Compose path: docker-compose.yml
# Preencha os valores em "Environment variables" da stack (NÃO commitar segredos).
# Conecta automaticamente ao seu Supabase Cloud via as env vars abaixo.

services:
  freeb:
    container_name: freeb
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # VITE_* são embutidas no bundle do cliente em tempo de BUILD (públicas).
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_MERCADOPAGO_PUBLIC_KEY: ${VITE_MERCADOPAGO_PUBLIC_KEY}
    image: freeb:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Segredos SÓ de servidor — sem prefixo VITE_ (nunca vão para o bundle).
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET}
      # URL pública HTTPS do app (p/ notification_url do Mercado Pago). Sem barra no fim.
      APP_URL: ${APP_URL}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
