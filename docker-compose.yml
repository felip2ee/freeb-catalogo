# Stack do Portainer (Docker Swarm) — FreeB
# A imagem é buildada pelo GitHub Actions e publicada no GHCR (ghcr.io).
# O Swarm NÃO builda (ignora "build:") — aqui só referenciamos a imagem PRONTA.
# Deploy: Portainer → Stacks → Add stack → Repository (aponta p/ este repo).
#   Compose path: docker-compose.yml
# Preencha as env vars da stack no Portainer (NÃO commitar segredos).
# As VITE_* NÃO entram aqui: são embutidas no build (GitHub Actions → secrets do repo).

services:
  freeb:
    # Troque pelo caminho do seu pacote no GHCR se o repo tiver outro nome.
    # Pode sobrescrever definindo IMAGE nas env vars da stack.
    image: ${IMAGE:-ghcr.io/felip2ee/freeb-catalogo:latest}
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      # Segredos SÓ de servidor — sem prefixo VITE_ (nunca vão para o bundle).
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}
      MERCADOPAGO_WEBHOOK_SECRET: ${MERCADOPAGO_WEBHOOK_SECRET}
      # URL pública HTTPS do app (p/ notification_url do Mercado Pago). Sem barra no fim.
      APP_URL: ${APP_URL}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
